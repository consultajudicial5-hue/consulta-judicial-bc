version: "3.8"

services:
  backend:
    image: python:3.11-slim
    container_name: consulta-judicial-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      bash -c "pip install --no-cache-dir -r requirements.txt &&
               uvicorn main:app --host 0.0.0.0 --port 8000 --log-level info"
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    image: node:18-alpine
    container_name: consulta-judicial-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=production
    command: >
      sh -c "npm install --legacy-peer-deps &&
             npm run build &&
             npm run start"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: consulta-judicial-db
    environment:
      POSTGRES_USER: pjbc
      POSTGRES_PASSWORD: pjbcpassword
      POSTGRES_DB: consulta_judicial
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db_data:
