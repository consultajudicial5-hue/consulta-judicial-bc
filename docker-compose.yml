version: "3.8"

services:
  backend:
    image: python:3.11-slim
    container_name: consulta-judicial-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - USE_REAL_SCRAPER=0
      - PJBC_BASE_URL=https://www.pjbc.gob.mx/boletin_Judicial.aspx
    command: >
      bash -c "pip install --no-cache-dir -r requirements.txt &&
               uvicorn main:app --host 0.0.0.0 --port 8000 --log-level info"
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: node:18-alpine
    container_name: consulta-judicial-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NODE_ENV=production
    command: >
      sh -c "npm install --legacy-peer-deps &&
             npm run build &&
             npm run start"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: consulta-judicial-db
    environment:
      POSTGRES_USER: pjbc
      POSTGRES_PASSWORD: pjbcpassword
      POSTGRES_DB: consulta_judicial
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pjbc -d consulta_judicial"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  frontend_node_modules:
